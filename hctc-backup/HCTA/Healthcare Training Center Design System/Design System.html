<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Healthcare Training Center — Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:    #1E3A6E;
  --navy-dk: #16294E;
  --teal:    #2B8FA9;
  --surface: #F4F6F9;
  --border:  #D0D8E8;
  --fg1:     #16243D;
  --fg2:     #44587A;
  --fg3:     #7A89A3;
  --white:   #FFFFFF;
  --radius:  10px;
  --sidebar: 216px;
  --hf:      'Montserrat', system-ui, sans-serif;
  --bf:      'Inter', system-ui, sans-serif;
}

body { font-family: var(--bf); background: var(--surface); color: var(--fg1); display: flex; flex-direction: column; min-height: 100vh; }

/* ── Header ── */
.ds-header {
  background: var(--navy);
  color: #fff;
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.ds-header .logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--hf); font-weight: 800; font-size: 14px; color: #fff;
}
.ds-header .logo-name { font-family: var(--hf); font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
.ds-header .logo-tag { font-size: 12px; color: rgba(255,255,255,.5); margin-left: 4px; }
.ds-header .badge-count { margin-left: auto; font-size: 12px; background: rgba(255,255,255,.12); border-radius: 20px; padding: 3px 10px; color: rgba(255,255,255,.7); }

/* ── Layout ── */
.layout { display: flex; flex: 1; min-height: 0; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--white);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  padding: 24px 0;
}
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--fg3); padding: 0 20px 8px; display: block;
}
.sidebar-link {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px; font-size: 13px; font-weight: 500; color: var(--fg2);
  text-decoration: none; cursor: pointer; border: none; background: none; width: 100%;
  text-align: left; transition: background .15s, color .15s;
}
.sidebar-link:hover { background: var(--surface); color: var(--fg1); }
.sidebar-link.active { color: var(--navy); background: #EEF2FB; font-weight: 600; }
.sidebar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sidebar-count { margin-left: auto; font-size: 11px; color: var(--fg3); }
.sidebar-divider { height: 1px; background: var(--border); margin: 12px 20px; }

/* ── Main ── */
.main { flex: 1; padding: 40px 48px; overflow-y: auto; max-width: 1100px; }

/* ── Section header ── */
.section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
.section-header h2 { font-family: var(--hf); font-weight: 700; font-size: 18px; color: var(--fg1); }
.section-header .section-count { font-size: 12px; color: var(--fg3); font-weight: 500; }
.ds-section { margin-bottom: 56px; scroll-margin-top: 72px; }

/* ── Card grid ── */
.card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
.card-grid.wide { grid-template-columns: 1fr; }

/* ── Card ── */
.ds-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: flex; flex-direction: column;
  transition: box-shadow .2s, transform .2s;
  cursor: pointer;
}
.ds-card:hover { box-shadow: 0 6px 24px rgba(30,58,110,.12); transform: translateY(-2px); }

/* preview region */
.card-preview {
  position: relative;
  overflow: hidden;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.card-preview iframe {
  border: none;
  display: block;
  transform-origin: top left;
  pointer-events: none;
}

/* card footer */
.card-footer { padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
.card-group-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 20px; margin-bottom: 2px;
  width: fit-content;
}
.card-name { font-size: 13px; font-weight: 600; color: var(--fg1); }
.card-sub { font-size: 12px; color: var(--fg3); }
.card-open {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: var(--teal);
  text-decoration: none;
}
.card-open:hover { text-decoration: underline; }
.card-download {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: var(--fg2);
  text-decoration: none; border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px; background: var(--surface);
}
.card-download:hover { background: var(--border); color: var(--fg1); }
</style>
</head>
<body>

<header class="ds-header">
  <div class="logo-mark">HC</div>
  <span class="logo-name">Healthcare Training Center</span>
  <span class="logo-tag">Design System</span>
  <span class="badge-count" id="totalCount"></span>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>

<script>
const GROUP_META = {
  'Brand':                { color: '#D4A017', bg: '#FBF3DD', id: 'brand' },
  'Colors':               { color: '#2B8FA9', bg: '#E2F0F4', id: 'colors' },
  'Components':           { color: '#1E3A6E', bg: '#EEF2FB', id: 'components' },
  'Spacing':              { color: '#2EAA6E', bg: '#E8F7EF', id: 'spacing' },
  'Type':                 { color: '#7B5EA7', bg: '#F1ECF7', id: 'type' },
  'UI Kit — Learner App': { color: '#3B7DD8', bg: '#ECF3FC', id: 'learner' },
  'UI Kit — Marketing':   { color: '#2BA89A', bg: '#E7F6F4', id: 'marketing' },
  'Templates':            { color: '#D4A017', bg: '#FBF3DD', id: 'templates' },
};

const CARDS = [
  { group:'Brand', name:'Certificate Specimen',     subtitle:'Playfair display name on completion',   path:'preview/certificate.html',       vw:700, vh:180 },
  { group:'Brand', name:'Room Icon Set (Phosphor)', subtitle:'Room + general UI glyphs',              path:'preview/room-icons.html',         vw:700, vh:230 },
  { group:'Brand', name:'Wordmark Lockup',          subtitle:'On light + on navy',                    path:'preview/wordmark.html',           vw:700, vh:150 },

  { group:'Colors', name:'Brand & Neutrals',        subtitle:'Navy, teal, surfaces, border',          path:'preview/colors-brand.html',       vw:700, vh:150 },
  { group:'Colors', name:'Training Room Accents',   subtitle:'The 5 room identity colors',            path:'preview/colors-rooms.html',       vw:700, vh:160 },
  { group:'Colors', name:'Semantic States',         subtitle:'Success / warning / error / info',      path:'preview/colors-semantic.html',    vw:700, vh:150 },

  { group:'Components', name:'Badges & Pills',            subtitle:'Status pills, room numbers, tags',      path:'preview/badges.html',        vw:700, vh:150 },
  { group:'Components', name:'Room-Accent Buttons',       subtitle:'Dynamic in-room CTA color',            path:'preview/buttons-room.html',  vw:700, vh:100 },
  { group:'Components', name:'Buttons',                   subtitle:'Variants + sizes',                     path:'preview/buttons.html',       vw:700, vh:150 },
  { group:'Components', name:'Course Card',               subtitle:'In-room course tiles',                 path:'preview/course-card.html',   vw:700, vh:220 },
  { group:'Components', name:'Form Input',                subtitle:'Default / focus / error states',       path:'preview/form-input.html',    vw:700, vh:140 },
  { group:'Components', name:'Help Desk & Announcement',  subtitle:'Banner + floating help widget',        path:'preview/helpdesk.html',      vw:700, vh:150 },
  { group:'Components', name:'Primary Navigation',        subtitle:'Authenticated navy nav bar',           path:'preview/nav.html',           vw:700, vh:110 },
  { group:'Components', name:'Progress Indicators',       subtitle:'Linear bars + circular ring',          path:'preview/progress.html',      vw:700, vh:170 },
  { group:'Components', name:'Room Entry Card',           subtitle:"The signature 'door' card",            path:'preview/room-card.html',     vw:700, vh:280 },

  { group:'Spacing', name:'Motion Tokens',           subtitle:'fast / base / slow / spring (animated)', path:'preview/motion.html',         vw:700, vh:180 },
  { group:'Spacing', name:'Corner Radius',           subtitle:'sm / md / lg / xl / full',              path:'preview/radius.html',          vw:700, vh:150 },
  { group:'Spacing', name:'Elevation & Shadows',     subtitle:'sm / md / lg + focus ring',             path:'preview/shadows.html',         vw:700, vh:150 },
  { group:'Spacing', name:'8px Scale',               subtitle:'space-1 through space-9',               path:'preview/spacing-scale.html',   vw:700, vh:250 },

  { group:'Type', name:'Body, UI & Accent',          subtitle:'Inter body/UI scale + Playfair accent', path:'preview/type-body.html',       vw:700, vh:230 },
  { group:'Type', name:'Font Families',              subtitle:'Montserrat · Inter · Playfair Display', path:'preview/type-families.html',   vw:700, vh:160 },
  { group:'Type', name:'Headings (Montserrat)',       subtitle:'Display through H4, Montserrat',       path:'preview/type-headings.html',   vw:700, vh:200 },

  { group:'UI Kit — Learner App', name:'Learner App — UI Kit', subtitle:'Lobby → Room → Course, click-through', path:'ui_kits/learner-app/index.html', vw:1280, vh:760 },
  { group:'UI Kit — Marketing',   name:'Marketing Site — UI Kit', subtitle:'Public landing page recreation',   path:'ui_kits/marketing/index.html',   vw:1280, vh:820 },

  { group:'Templates', name:'Course Announcement Emails', subtitle:'New course, deadline, certificate & live class templates', path:'preview/email-templates.html', vw:700, vh:200, download:'templates/Course Announcement Emails (Standalone).html' },
];

// Group cards
const grouped = {};
CARDS.forEach(c => { (grouped[c.group] = grouped[c.group]||[]).push(c); });

// Build sidebar
const sidebar = document.getElementById('sidebar');
sidebar.innerHTML = `<span class="sidebar-label">Design Tokens</span>` +
  ['Brand','Colors','Spacing','Type'].map(g => sidebarLink(g)).join('') +
  `<div class="sidebar-divider"></div><span class="sidebar-label">UI Components</span>` +
  sidebarLink('Components') +
  `<div class="sidebar-divider"></div><span class="sidebar-label">UI Kits</span>` +
  sidebarLink('UI Kit — Learner App') +
  sidebarLink('UI Kit — Marketing') +
  `<div class="sidebar-divider"></div><span class="sidebar-label">Templates</span>` +
  sidebarLink('Templates');

function sidebarLink(g) {
  const m = GROUP_META[g];
  const count = (grouped[g]||[]).length;
  const label = g.replace('UI Kit — ', '');
  return `<a class="sidebar-link" href="#${m.id}" onclick="setActive(this)">
    <span class="sidebar-dot" style="background:${m.color}"></span>
    ${label}
    <span class="sidebar-count">${count}</span>
  </a>`;
}

function setActive(el) {
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  el.classList.add('active');
}

// Build main
const main = document.getElementById('main');
const groupOrder = ['Brand','Colors','Spacing','Type','Components','UI Kit — Learner App','UI Kit — Marketing','Templates'];
let totalCards = 0;

groupOrder.forEach(g => {
  const cards = grouped[g] || [];
  totalCards += cards.length;
  const m = GROUP_META[g];
  const isWide = g.startsWith('UI Kit');
  const sec = document.createElement('section');
  sec.className = 'ds-section';
  sec.id = m.id;

  sec.innerHTML = `
    <div class="section-header">
      <h2>${g}</h2>
      <span class="section-count">${cards.length} ${cards.length === 1 ? 'item' : 'items'}</span>
    </div>
    <div class="card-grid ${isWide ? 'wide' : ''}">
      ${cards.map(c => cardHTML(c, m)).join('')}
    </div>`;
  main.appendChild(sec);
});

document.getElementById('totalCount').textContent = `${totalCards} items`;

function cardHTML(c, m) {
  const downloadBtn = c.download
    ? `<a class="card-download" href="${c.download}" download onclick="event.stopPropagation()">⬇ Download file</a>`
    : '';
  return `<div class="ds-card" onclick="window.open('${c.path}','_blank')" data-vw="${c.vw}" data-vh="${c.vh}">
    <div class="card-preview" data-vw="${c.vw}" data-vh="${c.vh}">
      <iframe src="${c.path}" loading="lazy" scrolling="no" data-vw="${c.vw}" data-vh="${c.vh}"></iframe>
    </div>
    <div class="card-footer">
      <span class="card-group-pill" style="color:${m.color};background:${m.bg}">${c.group}</span>
      <span class="card-name">${c.name}</span>
      <span class="card-sub">${c.subtitle}</span>
      <div style="display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap">
        <span class="card-open">Open full size →</span>
        ${downloadBtn}
      </div>
    </div>
  </div>`;
}

// Scale iframes to fit their preview wrapper
function scaleIframes() {
  document.querySelectorAll('.card-preview').forEach(wrapper => {
    const iframe = wrapper.querySelector('iframe');
    if (!iframe) return;
    const vw = parseInt(wrapper.dataset.vw);
    const vh = parseInt(wrapper.dataset.vh);
    const ww = wrapper.offsetWidth;
    const scale = ww / vw;
    const previewH = Math.round(vh * scale);
    wrapper.style.height = previewH + 'px';
    iframe.style.width = vw + 'px';
    iframe.style.height = vh + 'px';
    iframe.style.transform = `scale(${scale})`;
  });
}

// Run on load + resize
window.addEventListener('load', scaleIframes);
window.addEventListener('resize', scaleIframes);
scaleIframes();

// Sidebar active state on scroll
const sections = document.querySelectorAll('.ds-section');
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id;
      document.querySelectorAll('.sidebar-link').forEach(l => {
        l.classList.toggle('active', l.getAttribute('href') === '#' + id);
      });
    }
  });
}, { threshold: 0.2 });
sections.forEach(s => observer.observe(s));
</script>

</body>
</html>
