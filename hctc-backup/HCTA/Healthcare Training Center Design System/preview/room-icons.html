<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Brand — Room Icon Set (Phosphor)" subtitle="Room + general UI glyphs" viewport="700x230" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../assets/phosphor/regular/style.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; display:flex; gap:14px; flex-wrap:wrap; }
  .ic { flex:1; min-width:88px; display:flex; flex-direction:column; align-items:center; gap:8px; padding:14px 6px; border:1px solid var(--color-border); border-radius:12px; }
  .ic i { font-size:30px; }
  .nm { font-family:var(--font-body); font-size:10px; font-weight:600; color:var(--fg-2); text-align:center; }
  .gl { font-family:var(--font-body); font-size:9px; color:var(--fg-3); }
</style></head>
<body>
  <div class="ic"><i class="ph ph-users" style="color:#3B7DD8;"></i><span class="nm">Customer Service</span><span class="gl">ph-users</span></div>
  <div class="ic"><i class="ph ph-shield-check" style="color:#2BA89A;"></i><span class="nm">HIPAA</span><span class="gl">ph-shield-check</span></div>
  <div class="ic"><i class="ph ph-clipboard-text" style="color:#2EAA6E;"></i><span class="nm">Compliance</span><span class="gl">ph-clipboard-text</span></div>
  <div class="ic"><i class="ph ph-folder-open" style="color:#7B5EA7;"></i><span class="nm">Records</span><span class="gl">ph-folder-open</span></div>
  <div class="ic"><i class="ph ph-currency-dollar" style="color:#D4A017;"></i><span class="nm">Finance</span><span class="gl">ph-currency-dollar</span></div>
  <div class="ic"><i class="ph ph-certificate" style="color:var(--color-navy);"></i><span class="nm">Certificate</span><span class="gl">ph-certificate</span></div>
  <div class="ic"><i class="ph ph-video-camera" style="color:var(--color-navy);"></i><span class="nm">Live Class</span><span class="gl">ph-video-camera</span></div>
  <div class="ic"><i class="ph ph-books" style="color:var(--color-navy);"></i><span class="nm">Study Lounge</span><span class="gl">ph-books</span></div>
  <div class="ic"><i class="ph ph-headset" style="color:var(--color-navy);"></i><span class="nm">Help Desk</span><span class="gl">ph-headset</span></div>
  <div class="ic"><i class="ph ph-medal" style="color:var(--color-navy);"></i><span class="nm">Badge</span><span class="gl">ph-medal</span></div>
</body></html>
