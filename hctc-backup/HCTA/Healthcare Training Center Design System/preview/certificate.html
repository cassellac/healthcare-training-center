<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Brand — Certificate Specimen" subtitle="Playfair display name on completion" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../assets/phosphor/fill/style.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--color-surface); box-sizing:border-box; }
  .cert { background:#fff; border:1px solid var(--color-border); border-top:6px solid var(--color-room-hipaa); border-radius:10px; padding:20px 26px; text-align:center; box-shadow:var(--shadow-sm); }
  .eb { font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-3); }
  .name { font-family:var(--font-accent); font-weight:600; font-size:30px; color:var(--color-navy); margin:6px 0 2px; }
  .sub { font-family:var(--font-body); font-size:13px; color:var(--fg-2); }
  .seal { width:44px; height:44px; border-radius:50%; background:var(--color-room-hipaa); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:22px; margin-top:12px; }
</style></head>
<body>
  <div class="cert">
    <div class="eb">Certificate of Completion</div>
    <div class="name">Maria Delgado, RN</div>
    <div class="sub">HIPAA, Privacy &amp; Security · Issued May 22, 2026</div>
    <div class="seal"><i class="ph-fill ph-seal-check"></i></div>
  </div>
</body></html>
