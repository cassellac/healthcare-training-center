<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type — Font Families" subtitle="Montserrat · Inter · Playfair Display" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; display:flex; gap:18px; }
  .fam { flex:1; border:1px solid var(--color-border); border-radius:10px; padding:16px; }
  .glyph { font-size:38px; color:var(--color-navy); line-height:1; margin-bottom:8px; }
  .name { font-family:var(--font-body); font-size:13px; font-weight:600; color:var(--fg-1); }
  .use { font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:2px; }
  .wts { font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:8px; }
</style></head>
<body>
  <div class="fam">
    <div class="glyph" style="font-family:var(--font-heading);font-weight:800;">Aa Gg</div>
    <div class="name">Montserrat</div>
    <div class="use">Headings · wordmark</div>
    <div class="wts">600 · 700 · 800</div>
  </div>
  <div class="fam">
    <div class="glyph" style="font-family:var(--font-body);font-weight:600;">Aa Gg</div>
    <div class="name">Inter</div>
    <div class="use">Body · UI · labels</div>
    <div class="wts">400 · 500 · 600 · 700</div>
  </div>
  <div class="fam">
    <div class="glyph" style="font-family:var(--font-accent);font-weight:600;">Aa Gg</div>
    <div class="name">Playfair Display</div>
    <div class="use">Certificates only</div>
    <div class="wts">500 · 600 · 700</div>
  </div>
</body></html>
