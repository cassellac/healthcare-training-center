<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Course Card" subtitle="In-room course tiles" viewport="700x220" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../assets/phosphor/regular/style.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-surface); box-sizing:border-box; display:flex; gap:16px; }
  .c { width:208px; background:#fff; border-radius:8px; border:1px solid var(--color-border); overflow:hidden; box-shadow:var(--shadow-sm); }
  .thumb { height:74px; display:flex; align-items:center; justify-content:center; font-size:30px; color:#fff; }
  .b { padding:12px 14px 14px; }
  .meta { display:flex; gap:6px; margin-bottom:7px; }
  .tag { font-family:var(--font-body); font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; background:var(--color-surface); color:var(--fg-2); }
  .t { font-family:var(--font-heading); font-weight:600; font-size:14px; color:var(--fg-1); line-height:1.3; }
  .row { display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
  .dur { font-family:var(--font-body); font-size:11px; color:var(--fg-3); display:flex; align-items:center; gap:4px; }
  .go { font-family:var(--font-body); font-size:12px; font-weight:600; }
  .ring { width:28px; height:28px; }
</style></head>
<body>
  <div class="c">
    <div class="thumb" style="background:#2BA89A;"><i class="ph ph-shield-check"></i></div>
    <div class="b">
      <div class="meta"><span class="tag">45 MIN</span><span class="tag">BEGINNER</span></div>
      <div class="t">Protected Health Information (PHI)</div>
      <div class="row"><span class="dur"><i class="ph ph-circle-notch"></i> Not started</span><span class="go" style="color:#2BA89A;">Start →</span></div>
    </div>
  </div>
  <div class="c">
    <div class="thumb" style="background:#7B5EA7;"><i class="ph ph-folder-open"></i></div>
    <div class="b">
      <div class="meta"><span class="tag">30 MIN</span><span class="tag">CORE</span></div>
      <div class="t">How to Read a Medical Record</div>
      <div class="row">
        <svg class="ring" viewBox="0 0 36 36"><circle cx="18" cy="18" r="15" fill="none" stroke="#E7E2F0" stroke-width="5"/><circle cx="18" cy="18" r="15" fill="none" stroke="#7B5EA7" stroke-width="5" stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="38" transform="rotate(-90 18 18)"/></svg>
        <span class="go" style="color:#7B5EA7;">Continue →</span>
      </div>
    </div>
  </div>
</body></html>
