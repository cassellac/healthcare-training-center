<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — Training Room Accents" subtitle="The 5 room identity colors" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../assets/phosphor/fill/style.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  .sw { border-radius:10px; height:72px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:26px; }
  .num { position:absolute; margin:7px; font-family:var(--font-heading); font-size:11px; font-weight:700; color:rgba(255,255,255,.85); }
  .nm { font-family:var(--font-body); font-size:11px; font-weight:600; margin-top:7px; color:var(--fg-1); }
  .hx { font-family:var(--font-body); font-size:10px; color:var(--fg-3); }
</style></head>
<body>
  <div class="grid">
    <div><div class="sw" style="background:#3B7DD8;"><span class="num">1</span><i class="ph-fill ph-users"></i></div><div class="nm">Customer Service</div><div class="hx">#3B7DD8</div></div>
    <div><div class="sw" style="background:#2BA89A;"><span class="num">2</span><i class="ph-fill ph-shield-check"></i></div><div class="nm">HIPAA / Privacy</div><div class="hx">#2BA89A</div></div>
    <div><div class="sw" style="background:#2EAA6E;"><span class="num">3</span><i class="ph-fill ph-clipboard-text"></i></div><div class="nm">Compliance</div><div class="hx">#2EAA6E</div></div>
    <div><div class="sw" style="background:#7B5EA7;"><span class="num">4</span><i class="ph-fill ph-folder-open"></i></div><div class="nm">Medical Records</div><div class="hx">#7B5EA7</div></div>
    <div><div class="sw" style="background:#D4A017;"><span class="num">5</span><i class="ph-fill ph-currency-dollar"></i></div><div class="nm">Finance</div><div class="hx">#D4A017</div></div>
  </div>
</body></html>
