<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; display:flex; gap:16px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width:78px; height:60px; background:var(--color-teal-100); border:1.5px solid var(--color-teal); }
  .nm { font-family:var(--font-body); font-size:11px; font-weight:600; color:var(--fg-1); margin-top:8px; }
  .vl { font-family:var(--font-body); font-size:10px; color:var(--fg-3); }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:4px;"></div><div class="nm">sm</div><div class="vl">4px · tags</div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="nm">md</div><div class="vl">8px · cards/btn</div></div>
  <div class="item"><div class="box" style="border-radius:16px;"></div><div class="nm">lg</div><div class="vl">16px · room cards</div></div>
  <div class="item"><div class="box" style="border-radius:24px;"></div><div class="nm">xl</div><div class="vl">24px · lobby tiles</div></div>
  <div class="item"><div class="box" style="border-radius:9999px;width:60px;"></div><div class="nm">full</div><div class="vl">pills · avatars</div></div>
</body></html>
