<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px 24px; background:var(--color-surface); box-sizing:border-box; display:flex; gap:24px; align-items:center; }
  .item { text-align:center; }
  .box { width:120px; height:62px; background:#fff; border-radius:10px; }
  .nm { font-family:var(--font-body); font-size:11px; font-weight:600; color:var(--fg-1); margin-top:12px; }
  .vl { font-family:var(--font-body); font-size:10px; color:var(--fg-3); }
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm);"></div><div class="nm">shadow-sm</div><div class="vl">resting cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md);"></div><div class="nm">shadow-md</div><div class="vl">room cards · modals</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg);"></div><div class="nm">shadow-lg</div><div class="vl">drawers · panels</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-focus);"></div><div class="nm">shadow-focus</div><div class="vl">teal focus ring</div></div>
</body></html>
