<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../assets/phosphor/fill/style.css">
<style>
  body { margin:0; padding:0; background:var(--color-white); box-sizing:border-box; display:flex; }
  .half { flex:1; padding:26px 28px; display:flex; flex-direction:column; justify-content:center; gap:6px; }
  .dark { background:var(--color-navy); }
  .eyebrow { font-family:var(--font-heading); font-weight:700; font-size:10px; letter-spacing:.18em; text-transform:uppercase; }
  .mark { display:flex; align-items:center; gap:11px; }
  .cross { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; flex:none; }
  .word { font-family:var(--font-heading); font-weight:800; font-size:21px; letter-spacing:-.01em; line-height:1; }
</style></head>
<body>
  <div class="half">
    <span class="eyebrow" style="color:var(--color-teal);">A New Innovative</span>
    <div class="mark">
      <span class="cross" style="background:var(--color-navy);color:#fff;"><i class="ph-fill ph-first-aid"></i></span>
      <span class="word" style="color:var(--color-navy);">Healthcare<br>Training Center</span>
    </div>
  </div>
  <div class="half dark">
    <span class="eyebrow" style="color:var(--color-teal);">A New Innovative</span>
    <div class="mark">
      <span class="cross" style="background:#fff;color:var(--color-navy);"><i class="ph-fill ph-first-aid"></i></span>
      <span class="word" style="color:#fff;">Healthcare<br>Training Center</span>
    </div>
  </div>
</body></html>
