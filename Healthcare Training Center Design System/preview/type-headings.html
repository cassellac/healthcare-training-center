<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; }
  .row { display:flex; align-items:baseline; gap:14px; margin-bottom:10px; }
  .row:last-child { margin-bottom:0; }
  .tag { font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--fg-3); width:108px; flex:none; text-transform:uppercase; }
  .spec { font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-left:auto; flex:none; }
  .d { font-family:var(--font-heading); color:var(--color-navy); line-height:1.1; letter-spacing:-.01em; }
</style></head>
<body>
  <div class="row"><span class="tag">Display</span><span class="d" style="font-weight:800;font-size:40px;">Step Inside. Step Up.</span></div>
  <div class="row"><span class="tag">H1</span><span class="d" style="font-weight:700;font-size:30px;">Choose Your Training Path</span></div>
  <div class="row"><span class="tag">H2</span><span class="d" style="font-weight:700;font-size:24px;">What's Inside Each Room</span></div>
  <div class="row"><span class="tag">H3</span><span class="d" style="font-weight:600;font-size:20px;color:var(--fg-1);">HIPAA, Privacy &amp; Security</span></div>
  <div class="row"><span class="tag">H4</span><span class="d" style="font-weight:600;font-size:17px;color:var(--fg-1);">Why This Room Matters</span></div>
</body></html>
