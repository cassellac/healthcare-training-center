<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; }
  .grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
  .sw { border-radius:8px; height:64px; border:1px solid rgba(16,36,61,.06); display:flex; align-items:flex-end; padding:8px; box-sizing:border-box; }
  .nm { font-family:var(--font-body); font-size:11px; font-weight:600; margin-top:7px; color:var(--fg-1); }
  .hx { font-family:var(--font-body); font-size:10px; color:var(--fg-3); }
</style></head>
<body>
  <div class="grid">
    <div><div class="sw" style="background:#1E3A6E;"></div><div class="nm">Navy</div><div class="hx">#1E3A6E</div></div>
    <div><div class="sw" style="background:#2B8FA9;"></div><div class="nm">Teal</div><div class="hx">#2B8FA9</div></div>
    <div><div class="sw" style="background:#FFFFFF;"></div><div class="nm">White</div><div class="hx">#FFFFFF</div></div>
    <div><div class="sw" style="background:#F4F6F9;"></div><div class="nm">Surface</div><div class="hx">#F4F6F9</div></div>
    <div><div class="sw" style="background:#FAF7F2;"></div><div class="nm">Cream</div><div class="hx">#FAF7F2</div></div>
    <div><div class="sw" style="background:#D0D8E8;"></div><div class="nm">Border</div><div class="hx">#D0D8E8</div></div>
  </div>
</body></html>
