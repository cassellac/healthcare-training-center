<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--color-white); box-sizing:border-box; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .sw { border-radius:10px; height:60px; display:flex; align-items:flex-end; padding:8px; box-sizing:border-box; color:#fff; font-family:var(--font-body); font-size:11px; font-weight:600; }
  .nm { font-family:var(--font-body); font-size:11px; font-weight:600; margin-top:7px; color:var(--fg-1); }
  .hx { font-family:var(--font-body); font-size:10px; color:var(--fg-3); }
</style></head>
<body>
  <div class="grid">
    <div><div class="sw" style="background:#28A745;">Aa</div><div class="nm">Success</div><div class="hx">#28A745</div></div>
    <div><div class="sw" style="background:#FFC107;color:#5b4a00;">Aa</div><div class="nm">Warning</div><div class="hx">#FFC107</div></div>
    <div><div class="sw" style="background:#DC3545;">Aa</div><div class="nm">Error</div><div class="hx">#DC3545</div></div>
    <div><div class="sw" style="background:#17A2B8;">Aa</div><div class="nm">Info</div><div class="hx">#17A2B8</div></div>
  </div>
</body></html>
